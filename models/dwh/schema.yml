version: 2

models:
  - name: dim_issues
    description: "Cleaned issues filtered to Task, Epic, Story with title-cased summaries"
    columns:
      - name: issue_id
        tests:
          - not_null
          - unique
      - name: issue_key
        tests:
          - not_null
          - unique
      - name: issue_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Task', 'Epic', 'Story']
      - name: summary
        tests:
          - not_null

  - name: fct_issue_status_history
    description: "All status transitions per issue including initial status"
    columns:
      - name: issue_key
        tests:
          - not_null
      - name: changed_at
        tests:
          - not_null
      - name: to_status
        tests:
          - not_null